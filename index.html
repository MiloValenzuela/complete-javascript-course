<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <title>CRUD Application</title>
    <script src="script.js"></script>
</head>
<body style="color: white; background-color: #1d2630;">
    <div class="container mt-5">
        <div class="test-center">
            <h1 class="display-5 mb-5"><strong>CRUD Application</strong></h1>
        </div>
        <div class="main row justify-content-center">
            <form action="" id="student-form" class="row justify-content-center mb-4">
                <div class="col-10 mb-3">
                    <label for="firstName">First Name</label>
                    <input class="form-control" id="firstName" placeholder="Enter your Name" type="text">
                </div>
                <div class="col-10 mb-3">
                    <label for="lastName">Last Name</label>
                    <input class="form-control" id="lastName" placeholder="Enter your Last Name" type="text">
                </div>
                <div class="col-10 mb-3">
                    <label for="rollNo">Roll No</label>
                    <input class="form-control" id="rollNo" placeholder="Enter Roll No" type="text">
                </div>
                <div class="col-10">
                    <input class="btn btn-success" type="submit" value="Submit">
                </div>
            </form>
            <div class="col-10 mt-5">
                <table class="table" table-striped table-dark>
                    <thead>
                        <tr>First Name</tr>
                        <tr>Last Name</tr>
                        <tr>Roll No</tr>
                        <tr>Action</tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
